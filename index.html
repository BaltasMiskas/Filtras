            const headline = document.getElementById('bm-res-headline');

            wrapper.innerHTML = ''; 

            let filtered = dataset.filter(function(item) {
                return item.weather === weather && item.occasion === occasion && (type === 'visi' || item.type === type);
            });

            if (filtered.length === 0) {
                headline.innerText = "Rezultatai";
                wrapper.innerHTML = '<p class="bm-description">Šiuo metu pagal pasirinktus kriterijus konkrečių rekomendacijų neturime. Pabandykite pakeisti 3 žingsnio pasirinkimą į „Rodyti visą asortimentą“.</p>';

                headline.innerText = "Rekomenduojami pasirinkimai";

                    card.className = 'bm-output-card';
                    card.innerHTML = '\
