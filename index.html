<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baltas Miškas | Stiliaus Gidas</title>
    <style>
        :root {
            /* Firminė Baltas Miškas ochros/aukso akcentinė spalva */
            --brand-color: #a16207; 
            --bg-light: #ffffff;
            --text-dark: #1c1c1c;
            --text-muted: #666666;
            --border-light: #eaeaea;
            --bg-box: #fbfbfb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px 0;
        }

        h2 {
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        /* 3 žingsnių filtro tinklelis */
        .filter-steps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .filter-steps-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            background: var(--bg-box);
            padding: 20px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }

        .step-number {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--brand-color);
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        select {
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 2px;
            font-size: 0.95rem;
            background: #fff;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
            cursor: pointer;
            width: 100%;
        }

        select:focus {
            border-color: var(--brand-color);
        }

        .submit-btn-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .submit-btn {
            background: var(--brand-color);
            color: #ffffff;
            border: 1px solid var(--brand-color);
            padding: 14px 40px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 2px;
            width: 100%;
            max-width: 320px;
        }

        .submit-btn:hover {
            background: transparent;
            color: var(--brand-color);
        }

        .results-wrapper {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            height: 1px;
            background-color: var(--border-light);
            margin: 20px 0 35px 0;
        }

        .results-headline {
            font-weight: 400;
            font-size: 1.2rem;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .rec-card {
            border: 1px solid var(--border-light);
            padding: 24px;
            background: #ffffff;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .rec-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(161, 98, 7, 0.08);
            border-color: var(--brand-color);
        }

        .rec-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--brand-color);
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .rec-title {
            font-size: 1.15rem;
            font-weight: 400;
            margin: 0 0 12px 0;
            color: var(--text-dark);
        }

        .rec-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .shop-link {
            display: inline-block;
            text-align: center;
            background: transparent;
            color: var(--brand-color);
            border: 1px solid var(--brand-color);
            padding: 11px 16px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.2s ease;
            border-radius: 2px;
            font-weight: 500;
        }

        .shop-link:hover {
            background: var(--brand-color);
            color: #ffffff;
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
            background: var(--bg-box);
            border: 1px dashed var(--border-light);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Baltas Miškas lietuvių dizainerių drabužių rekomendacijos pagal orus</h2>
    <div class="subtitle">Atraskite autorinius gaminius, idealiai tinkančius jūsų dienai ir progai</div>

    <!-- 3 ŽINGSNIŲ FILTRAS -->
    <div class="filter-steps-grid">
        
        <!-- 1 ŽINGSNIS: ORAI -->
        <div class="form-group">
            <span class="step-number">Žingsnis 1</span>
            <label for="weather-select">Kokie orai lauke?</label>
            <select id="weather-select">
                <option value="karsta">Karšta vasara (>22°C)</option>
                <option value="silta">Šilta / Vidutiniška (15°C - 22°C)</option>
                <option value="vejuota">Vėsu / Vėjuota / Lyja (<15°C)</option>
            </select>
        </div>

        <!-- 2 ŽINGSNIS: PROGA -->
        <div class="form-group">
            <span class="step-number">Žingsnis 2</span>
            <label for="occasion-select">Kokiai progai renkatės?</label>
            <select id="occasion-select">
                <option value="kasdienai">Kasdienai / Mieste</option>
                <option value="sventei">Šventei / Vakarienei</option>
                <option value="darbui">Darbui / Ofisui</option>
                <option value="laisvalaikiui">Laisvalaikiui / Gamtai</option>
            </select>
        </div>

        <!-- 3 ŽINGSNIS: ASORTIMENTAS / AUDINYS -->
        <div class="form-group">
            <span class="step-number">Žingsnis 3</span>
            <label for="type-select">Ko ieškote labiausiai?</label>
            <select id="type-select">
                <option value="visi">Rodyti viską</option>
                <option value="sukneles">Suknelės</option>
                <option value="audinys">Natūralūs audiniai (Linas/Kašmyras)</option>
                <option value="virsutiniai">Viršutiniai rūbai / Švarkai</option>
                <option value="kostiumai">Kostiumėliai</option>
                <option value="aksesuarai">Aksesuarai / Papuošalai / Kvepalai</option>
            </select>
        </div>

    </div>

    <!-- VEIKSMO MYGTUKAS -->
    <div class="submit-btn-container">
        <button type="button" class="submit-btn" id="filter-btn">Ieškoti derinių</button>
    </div>

    <div class="divider"></div>

    <!-- REZULTATŲ ZONA -->
    <div class="results-wrapper" id="results-area">
        <div class="results-headline">Mūsų stilistų rekomenduojami pasirinkimai:</div>
        <div class="recommendations-grid" id="recommendations-container">
            <!-- Dinamiškai užpildoma iš JavaScript -->
        </div>
    </div>
</div>

<script>
    const baseUrl = 'https://www.baltasmiskas.lt';

    // Struktūrizuota duomenų bazė, pritaikyta naujam 3 lygių filtravimui
    const dataset = [
        // --- KARŠTA ORŲ GRUPĖ ---
        { weather: "karsta", occasion: "kasdienai", type: "audinys", tag: "Linas", title: "Lininiai deriniai", desc: "Lengvas, kvėpuojantis lino audinys – pats komfortiškiausias pasirinkimas karštai vasaros dienai mieste.", url: "/pagrindinis-meniu/lininiai-deriniai" },
        { weather: "karsta", occasion: "kasdienai", type: "virsutiniai", tag: "Vasara", title: "Stilingi šortai", desc: "Laisvo kirpimo lietuvių dizainerių šortai patogiam ir lengvam judėjimui mieste.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/kelnes/sortai" },
        
        { weather: "karsta", occasion: "sventei", type: "sukneles", tag: "Elegancija", title: "Vasaros suknelės", desc: "Plazdančios, lengvos autorinio dizaino suknelės ypatingoms vasaros akimirkoms ir atviro oro šventėms.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/lietuviu-dizaineriu-sukneles" },
        { weather: "karsta", occasion: "sventei", type: "aksesuarai", tag: "Akcentas", title: "Rankų darbo papuošalai", desc: "Užbaikite savo šventinį vasaros įvaizdį išskirtiniais lietuvių kūrėjų auskarais ar kaklo aksesuarais.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/papuosalai-jai" },
        
        { weather: "karsta", occasion: "darbui", type: "kostiumai", tag: "Stilius Ofise", title: "Lino laisvalaikio kostiumai", desc: "Struktūrizuoti, bet vėsūs lininiai kostiumėliai, užtikrinantys profesionalią išvaizdą net ir per didžiausius karščius.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/kostiumeliai/lininiai-laisvalaikio-kostiumai" },
        { weather: "karsta", occasion: "darbui", type: "virsutiniai", tag: "Klasika", title: "Lengvos palaidinės", desc: "Elegantiškos ir plonos palaidinės trumpomis rankovėmis, lengvai priderinamos po vasariniu švarku.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/palaidines" },
        
        { weather: "karsta", occasion: "laisvalaikiui", type: "virsutiniai", tag: "Komfortas", title: "Vasaros kombinezonai", desc: "Vieno drabužio magija judesio laisvei – lengvi kombinezonai nerūpestingam poilsiui pajūryje ar gamtoje.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/kelnes/kombinezonai" },
        { weather: "karsta", occasion: "laisvalaikiui", type: "aksesuarai", tag: "Prie Jūros", title: "Maudymosi kostiumėliai", desc: "Aukštos kokybės, išskirtinio dizaino lietuvių kūrėjų maudymosi kostiumėliai jūsų atostogų akimirkoms.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/laisvalaikio-ir-namu-drabuziai/maudymosi-kostiumeliai" },

        // --- ŠILTA ORŲ GRUPĖ ---
        { weather: "silta", occasion: "kasdienai", type: "audinys", tag: "Mezginiai", title: "Ploni megztiniai", desc: "Idealus pasirinkimas giedrai, bet permainingai dienai, kai norisi švelnaus jaukumo sluoksniuojant įvaizdį.", url: "/pagrindinis-meniu/ploni-megztiniai" },
        { weather: "silta", occasion: "kasdienai", type: "sukneles", tag: "Klasika", title: "Stilingi sijonai", desc: "Midi ar maxi autorinio dizaino sijonai, puikiai derantys su baziniais marškinėliais arba lengvu megztuku.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/sijonai" },
        
        { weather: "silta", occasion: "sventei", type: "sukneles", tag: "Grakštumas", title: "Šilko ir medvilnės suknelės", desc: "Prabangios tekstūros dizainerių suknelės su elegantišku kritimu, idealiai tinkančios jaukiam vakarui.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/lietuviu-dizaineriu-sukneles" },
        { weather: "silta", occasion: "sventei", type: "aksesuarai", tag: "Aksesuarai", title: "Šilko skarelės", desc: "Subtilus autorinės skarelės akcentas jūsų elegantiškam įvaizdžiui papildyti.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/salikai-skareles/skareles" },
        
        { weather: "silta", occasion: "darbui", type: "kostiumai", tag: "Profesionalu", title: "Klasikiniai kostiumėliai", desc: "Nepriekaištingo kirpimo švarko ir kelnių/sijono dizainerių deriniai jūsų kasdieniam darbui biure.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/kostiumeliai/klasikiniai-kostiumeliai" },
        { weather: "silta", occasion: "darbui", type: "virsutiniai", tag: "Struktūra", title: "Kokybiški švarkai", desc: "Lietuvos kūrėjų švarkai, suteikiantys charakterio ir formalumo bet kokiam baziniam deriniui.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/svarkai" },
        
        { weather: "silta", occasion: "laisvalaikiui", type: "virsutiniai", tag: "Laisvė", title: "Patogios kelnės", desc: "Laisvalaikio kelnės kartu su autorinio dizaino marškinėliais – neįpareigojančiam patogumui.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/kelnes/kelnes-2" },
        { weather: "silta", occasion: "laisvalaikiui", type: "aksesuarai", tag: "Praktiška", title: "Dizainerių kuprinės", desc: "Talpios ir stilingos odinės bei tekstilinės lietuvių kūrėjų kuprinės visiems jūsų kasdieniams daiktams.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/rankines-2/lietuviu-dizaineriu-kuprines" },

        // --- VĖSU / VĖJUOTA ORŲ GRUPĖ ---
        { weather: "vejuota", occasion: "kasdienai", type: "audinys", tag: "Jaukumas", title: "Išskirtiniai kardiganai", desc: "Vėsiai dienai – jaukūs, minkšti ir šilti ilgieji mezginiai bei kardiganai.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/megzti-drabuziai/kardiganai" },
        { weather: "vejuota", occasion: "kasdienai", type: "aksesuarai", tag: "Būtina", title: "Autorinio dizaino rankinės", desc: "Papildykite savo rudeninį ar pavasarinį įvaizdį išraiškinga natūralios odos rankine.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/rankines-2/rankines" },
        
        { weather: "vejuota", occasion: "sventei", type: "audinys", tag: "Prabanga", title: "Kašmyro mezginiai", desc: "Ypatingai švelnus ir aukštos kokybės kašmyras, kuris sušildo ir atrodo nepriekaištingai vakarienės metu.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/megzti-drabuziai/kasmyro-mezginiai" },
        { weather: "vejuota", occasion: "sventei", type: "aksesuarai", tag: "Nuotaika", title: "Nišiniai kvepalai", desc: "Sukurkite nematomą, bet itin gilų šventinį įspūdį su nišinės parfumerijos kūriniais.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/nisiniai-kvepalai" },
        
        { weather: "vejuota", occasion: "darbui", type: "virsutiniai", tag: "Apsauga", title: "Stilingi lietpalčiai", desc: "Lietuvos dizainerių kurti lietpalčiai, saugantys nuo vėjo bei lietaus ir išlaikantys miesto eleganciją.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/paltai-striukes-lietpalciai/lietpalciai" },
        { weather: "vejuota", occasion: "darbui", type: "virsutiniai", tag: "Elegancija", title: "Kūrėjų marškiniai", desc: "Klasikiniai ir modernizuoti marškiniai, idealiai tinkantys po megztiniu ar švarku.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/palaidines/marskiniai" },
        
        { weather: "vejuota", occasion: "laisvalaikiui", type: "virsutiniai", tag: "Šiluma", title: "Paltai ir striukės", desc: "Kokybiški ir šilti viršutiniai drabužiai žvarbesniems pasivaikščiojimams gamtoje ar mieste.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/paltai-striukes-lietpalciai/paltaistriukes" },
        { weather: "vejuota", occasion: "laisvalaikiui", type: "audinys", tag: "Komfortas", title: "Šilti džemperiai", desc: "Minkšti, stori medvilnės džemperiai su pūkeliu – visiškam patogumui vėsiomis dienomis.", url: "/pagrindinis-meniu/lietuvos-dizaineriu-drabuziai-ir-aksesuarai-moterims/megzti-drabuziai/dzemperiai-2" }
    ];

    function filterProducts() {
        const selectedWeather = document.getElementById('weather-select').value;
        const selectedOccasion = document.getElementById('occasion-select').value;
        const selectedType = document.getElementById('type-select').value;

        const container = document.getElementById('recommendations-container');
        container.innerHTML = ''; // Išvalome senus rezultatus

        // Atliekame filtravimą pagal vartotojo pasirinkimus
        const filteredItems = dataset.filter(item => {
            const matchesWeather = item.weather === selectedWeather;
            const matchesOccasion = item.occasion === selectedOccasion;
            const matchesType = selectedType === 'visi' || item.type === selectedType;
            return matchesWeather && matchesOccasion && matchesType;
        });

        // Jei rezultatų nėra
        if (filteredItems.length === 0) {
            container.innerHTML = `
                <div class="no-results" style="grid-column: 1 / -1;">
                    Šiuo metu pagal pasirinktą filtrų derinį konkrečių rekomendacijų neturime. 
                    Pabandykite pakeisti 3 žingsnio pasirinkimą į „Rodyti viską“.
                </div>
            `;
        } else {
            // Generuojame korteles
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'rec-card';
                card.innerHTML = `
                    <div>
                        <div class="rec-tag">${item.tag}</div>
                        <h3 class="rec-title">${item.title}</h3>
                        <p class="rec-desc">${item.desc}</p>
                    </div>
                    <a href="${baseUrl}${item.url}" target="_blank" class="shop-link">Atrasti asortimentą</a>
                `;
                container.appendChild(card);
            });
        }

        // Parodome rezultatų bloką
        document.getElementById('results-area').style.display = 'block';
    }

    // Prisegame filtravimo funkciją prie mygtuko paspaudimo
    document.getElementById('filter-btn').addEventListener('click', filterProducts);
</script>

</body>
</html>
